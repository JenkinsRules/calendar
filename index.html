<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- Top bar -->
    <header id="top-bar">
      <div id="top-left">
        <button id="btn-menu" aria-label="Toggle sidebar">
          <span class="h-line"></span>
          <span class="h-line"></span>
          <span class="h-line"></span>
        </button>
        <div id="cal-icon" aria-hidden="true">
          <div class="cal-icon-top"></div>
          <div class="cal-icon-body" id="cal-icon-day"></div>
        </div>
        <span id="app-name">Calendar</span>
      </div>

      <div id="top-center">
        <button id="btn-today">Today</button>
        <button id="btn-prev" aria-label="Previous month">&#8249;</button>
        <button id="btn-next" aria-label="Next month">&#8250;</button>
        <h1 id="month-label"></h1>
      </div>

      <div id="top-right"></div>
    </header>

    <!-- Body: sidebar + main calendar -->
    <div id="app-body">

      <aside id="sidebar">
        <button id="btn-add-event">
          <svg class="create-plus" viewBox="0 0 24 24" fill="none" width="22" height="22">
            <path d="M12 5v14M5 12h14" stroke-width="2.2" stroke-linecap="round"/>
          </svg>
          <span>Create</span>
        </button>

        <div id="mini-calendar">
          <div id="mini-cal-header">
            <span id="mini-month-label"></span>
            <div class="mini-nav">
              <button id="mini-prev" aria-label="Previous month">&#8249;</button>
              <button id="mini-next" aria-label="Next month">&#8250;</button>
            </div>
          </div>
          <div id="mini-day-headers"></div>
          <div id="mini-grid"></div>
        </div>
      </aside>

      <main id="calendar-container">
        <div id="day-headers" role="row"></div>
        <div id="calendar-grid" role="grid" aria-label="Calendar"></div>
      </main>
    </div>
  </div>

  <!-- Add / Edit Event Modal -->
  <div id="modal-overlay" class="hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div id="modal">
      <header id="modal-header">
        <h2 id="modal-title">Add Event</h2>
        <button id="modal-close" aria-label="Close">&times;</button>
      </header>
      <form id="event-form" novalidate>
        <div class="field-group">
          <label for="input-title">Title <span class="required" aria-hidden="true">*</span></label>
          <input id="input-title" type="text" maxlength="100" autocomplete="off"
                 aria-required="true" aria-describedby="err-title">
          <span class="error-msg" id="err-title" aria-live="polite"></span>
        </div>
        <div class="field-group">
          <label for="input-date">Date <span class="required" aria-hidden="true">*</span></label>
          <input id="input-date" type="date"
                 aria-required="true" aria-describedby="err-date">
          <span class="error-msg" id="err-date" aria-live="polite"></span>
        </div>
        <div class="field-group">
          <label for="input-time">Time <span class="optional">(optional)</span></label>
          <input id="input-time" type="time">
        </div>
        <div class="field-group">
          <label for="input-desc">Description <span class="optional">(optional)</span></label>
          <textarea id="input-desc" rows="3" maxlength="500"></textarea>
        </div>
        <div id="modal-actions">
          <button type="button" id="btn-delete-event" class="hidden danger">Delete</button>
          <button type="submit" id="btn-save-event">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
